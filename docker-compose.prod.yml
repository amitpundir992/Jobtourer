# Production Docker Compose configuration
# Use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /data/redis:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobtourer-app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  search-worker:
    build:
      context: .
      dockerfile: workers/search-worker/Dockerfile
    container_name: jobtourer-search-worker
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis

  email-worker:
    build:
      context: .
      dockerfile: workers/email-worker/Dockerfile
    container_name: jobtourer-email-worker
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
